<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名古屋 2026 · 相簿</title>
  <meta name="description" content="2026 名古屋七天旅行相簿——分天瀏覽，超過千張照片。" />
  <meta property="og:title" content="名古屋 2026 · 相簿" />
  <meta property="og:description" content="七天旅行相簿 · 名古屋 2026" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Outfit:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Outfit"', '"Noto Sans TC"', 'sans-serif'],
            serif: ['"Noto Serif TC"', 'serif'],
            display: ['"Amatic SC"', '"Noto Sans TC"', 'cursive']
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --bg-main: #faf9f6; /* Sophisticated museum off-white */
      --ink: #1a1a1a;
      --ink-soft: #525252;
      --line: #1a1a1a;
      --accent: #262626;
      --day-1: #b91c1c;
      --day-2: #c2410c;
      --day-3: #0369a1;
      --day-4: #7c3aed;
      --day-5: #db2777;
      --day-6: #0d9488;
      --day-7: #ca8a04;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background-color: var(--bg-main);
      overflow-x: hidden;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* Organic Noise Texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04;
      z-index: 100;
      mix-blend-mode: multiply;
    }

    .top-nav {
      background: rgba(249, 248, 244, 0.8);
      border-bottom: none;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 600ms cubic-bezier(0.16, 1, 0.3, 1), opacity 600ms ease;
    }

    .top-nav.hidden-nav {
      transform: translateY(-100%);
      opacity: 0;
    }

    .brand-mark {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav-shell {
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      padding: 0.2rem;
    }

    .nav-link {
      border-radius: 999px;
      color: var(--ink-soft);
      font-weight: 500;
      transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--ink);
      color: #fff;
    }

    .album-head {
      padding: 4rem 1.5rem 6rem;
      text-align: center;
    }

    .display-title {
      font-family: 'serif';
      font-weight: 700;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--ink);
    }

    /* ── Masonry Grid Elite ── */
    .album-grid {
      display: block;
      column-gap: 3rem;
      width: 100%;
    }

    .album-grid.comfy { column-count: 2; }
    .album-grid.dense { column-count: 3; }

    @media (min-width: 768px) {
      .album-grid.comfy { column-count: 3; }
      .album-grid.dense { column-count: 4; }
    }

    @media (min-width: 1280px) {
      .album-grid { column-gap: 5rem; }
      .album-grid.comfy { column-count: 4; }
      .album-grid.dense { column-count: 6; }
    }

    .album-thumb {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
      margin-bottom: 3rem;
      border-radius: 4px;
      background: transparent;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: translateY(40px);
    }

    @media (min-width: 1280px) {
      .album-thumb { margin-bottom: 5rem; }
    }

    .album-thumb.reveal-show {
      opacity: 1;
      transform: translateY(0);
    }

    .album-thumb img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
      transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .album-thumb:hover {
      transform: translateY(-12px);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .album-thumb:hover img {
      transform: scale(1.06);
    }

    /* ── Custom Cursor Studio ── */
    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 10px;
      height: 10px;
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 600ms cubic-bezier(0.16, 1, 0.3, 1), 
                  height 600ms cubic-bezier(0.16, 1, 0.3, 1), 
                  background 600ms ease,
                  opacity 600ms ease;
      display: none;
    }

    @media (pointer: fine) {
      #custom-cursor { display: block; }
    }

    body.hovering-photo #custom-cursor {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    body.hovering-photo #custom-cursor::after {
      content: 'VIEW';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #fff;
    }

    /* ── Floating Pill Nav Studio ── */
    .floating-pill-nav {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 45;
      pointer-events: none;
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .floating-pill-nav.ui-hidden {
      transform: translateX(-50%) translateY(50px);
      opacity: 0;
    }

    .pill-inner {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      padding: 0.6rem;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
    }

    .pill-day-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--ink-soft);
      transition: all 600ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pill-day-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .lightbox-shell {
      opacity: 0;
      visibility: hidden;
      transition: all 800ms cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(20px);
    }

    .lightbox-shell.open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-btn {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.02);
      transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .lightbox-caption {
      border: none;
      background: transparent;
      padding: 2rem;
      text-align: center;
    }

    /* ── Reveal Animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ── Skeleton & Fade-in ── */
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.8; }
    }
    .album-thumb.loading { background: linear-gradient(110deg, #e2e8f0 30%, #f1f5f9 50%, #e2e8f0 70%); background-size: 200% 100%; animation: skeleton-pulse 1.4s ease infinite; }
    .album-thumb img { opacity: 0; transition: opacity 380ms ease; }
    .album-thumb img.loaded { opacity: 1; }

    /* ── Floating Counter ── */
    .floating-counter {
      position: fixed;
      right: 1rem;
      bottom: 8.2rem;
      z-index: 28;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: rgba(255,253,247,0.92);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 900;
      color: #334155;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 260ms ease, transform 260ms ease;
      pointer-events: none;
      display: none;
    }
    .floating-counter.visible { opacity: 1; transform: translateY(0); }
    @media (max-width: 767px) { .floating-counter { display: block; } }

    /* ── Scroll Progress (top) ── */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      z-index: 50;
      background: linear-gradient(90deg, var(--day-1), var(--day-2), var(--day-3), var(--day-4), var(--day-5), var(--day-6), var(--day-7));
      transition: width 80ms linear;
      border-radius: 0 2px 2px 0;
      filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.5));
    }

    /* ── Footer ── */
    .site-footer {
      position: relative;
      background: #0a0a0a;
      color: #737373;
      padding: 10rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    .site-footer a { color: #fff; text-decoration: underline; }
    .footer-brand {
      font-family: 'serif';
      font-size: 3rem;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .footer-rainbow {
      display: flex;
      height: 1px;
      margin-top: 3rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.2;
    }
    .footer-rainbow span { flex: 1; }
    .footer-icons {
      font-size: 1.2rem;
      letter-spacing: 0.5rem;
      margin-top: 1.5rem;
      opacity: 0.4;
    }
    /* ── Custom Cursor ── */
    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      border: 3px solid var(--line);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 200ms ease, height 200ms ease, background 200ms ease, border-color 200ms ease;
      will-change: width, height, transform, background;
      display: none;
    }

    @media (pointer: fine) {
      #custom-cursor {
        display: block;
      }
    }

    body.hovering-link #custom-cursor {
      width: 48px;
      height: 48px;
      background: rgba(34, 197, 94, 0.4);
      border-color: transparent;
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body class="font-sans antialiased selection:bg-emerald-900 selection:text-white">

  <script src="./data/album.manifest.js"></script>
  <script>
    const dayMeta = [
      { day: 1, date: '2026.04.01', cover: './images/day1-castle.jpg' },
      { day: 2, date: '2026.04.02', cover: './images/day2-tsuruma.jpg' },
      { day: 3, date: '2026.04.03', cover: './images/day3-aquarium.jpg' },
      { day: 4, date: '2026.04.04', cover: './images/day4-osu.jpg' },
      { day: 5, date: '2026.04.05', cover: './images/day5-tokugawa.jpg' },
      { day: 6, date: '2026.04.06', cover: './images/day6-tower.jpg' },
      { day: 7, date: '2026.04.07', cover: './images/day7-departure.jpg' }
    ];

    const fallbackAlbumData = {
      1: ['./images/day1-castle.jpg', './images/day1-sakura.jpg', './images/gallery-1.jpg', './images/gallery-2.jpg'],
      2: ['./images/day2-tsuruma.jpg', './images/day2-mountain.jpg', './images/gallery-3.jpg'],
      3: ['./images/day3-aquarium.jpg', './images/day3-street.jpg', './images/gallery-4.jpg'],
      4: ['./images/day4-osu.jpg', './images/day4-street.jpg', './images/gallery-5.jpg'],
      5: ['./images/day5-tokugawa.jpg', './images/gallery-8.jpg'],
      6: ['./images/day6-tower.jpg', './images/gallery-6.jpg'],
      7: ['./images/day7-departure.jpg', './images/gallery-7.jpg']
    };

    const BATCH_SIZE = 36;

    const albumGrid = document.getElementById('album-grid');
    const albumEmpty = document.getElementById('album-empty');
    const albumLoadMore = document.getElementById('album-load-more');
    const lightboxShell = document.getElementById('lightbox-shell');
    const lightboxClose = document.getElementById('lightbox-close');
    const lightboxPrev = document.getElementById('lightbox-prev');
    const lightboxNext = document.getElementById('lightbox-next');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxMeta = document.getElementById('lightbox-meta');
    const backTop = document.getElementById('back-top');
    const scrollProgressEl = document.getElementById('scroll-progress');
    const floatingPillNav = document.getElementById('floating-pill-nav');
    const bottomPillsEl = document.getElementById('bottom-day-pills');
    const floatingCounter = document.getElementById('floating-counter');

    const state = {
      albumData: {},
      currentDay: 1,
      visibleCount: BATCH_SIZE,
      lightboxIndex: 0,
      viewMode: 'comfy',
      lastFocusedPhoto: null,
      touchStartX: 0,
      touchStartY: 0,
      photoLookup: new Map(),
      photosByDay: {},
      autoLoadObserver: null
    };

    function mergeUnique(items) {
      const seen = new Set();
      return items.filter((item) => {
        if (typeof item !== 'string' || !item.trim()) return false;
        if (seen.has(item)) return false;
        seen.add(item);
        return true;
      });
    }

    function isRemoteUrl(value) {
      return /^https?:\/\//i.test(value);
    }

    function normalizePath(value) {
      return String(value || '')
        .trim()
        .replace(/\\/g, '/')
        .replace(/^\.\//, '')
        .replace(/^\/+/, '');
    }

    function inferDay(value) {
      const match = String(value || '').match(/day\s*([1-7])/i);
      if (!match) return null;
      return Number(match[1]);
    }

    function resolveAsset(path) {
      if (!path || isRemoteUrl(path)) return path;
      const found = state.photoLookup.get(normalizePath(path));
      return found || path;
    }

    function applyResolvedAssets() {
      dayMeta.forEach((meta) => {
        meta.cover = resolveAsset(meta.cover);
      });

      Object.keys(fallbackAlbumData).forEach((day) => {
        fallbackAlbumData[day] = (fallbackAlbumData[day] || []).map((path) => resolveAsset(path));
      });

      document.querySelectorAll('img[src^="./images/"]').forEach((img) => {
        const current = img.getAttribute('src');
        const resolved = resolveAsset(current);
        if (resolved && resolved !== current) {
          img.setAttribute('src', resolved);
        }
      });
    }

    async function loadPhotosJson() {
      try {
        const response = await fetch('./data/photos.json', { cache: 'no-store' });
        if (!response.ok) {
          return;
        }
        const list = await response.json();
        if (!Array.isArray(list)) {
          return;
        }

        const byDay = {};
        list.forEach((photo) => {
          if (!photo || typeof photo !== 'object') return;
          const url = typeof photo.url === 'string' ? photo.url.trim() : '';
          if (!url) return;

          const source = typeof photo.source === 'string' ? normalizePath(photo.source) : '';
          if (source) {
            state.photoLookup.set(source, url);
          }

          const day = Number(photo.day) || inferDay(photo.source) || inferDay(photo.key) || inferDay(photo.filename);
          if (day >= 1 && day <= 7) {
            byDay[day] = byDay[day] || [];
            byDay[day].push(url);
          }
        });

        state.photosByDay = byDay;
      } catch (_error) {
        state.photosByDay = {};
      }
    }

    function getDayCover(day) {
      const meta = dayMeta.find((entry) => entry.day === day);
      return meta ? meta.cover : resolveAsset('./images/hero-nagoya.jpg');
    }

    function buildAlbumData() {
      const source = typeof window.NAGOYA_ALBUM_DATA === 'object' && window.NAGOYA_ALBUM_DATA !== null
        ? window.NAGOYA_ALBUM_DATA
        : {};
      const normalized = {};

      dayMeta.forEach((meta) => {
        const jsonPhotos = Array.isArray(state.photosByDay[meta.day]) ? state.photosByDay[meta.day] : [];
        const sourcePhotos = Array.isArray(source[meta.day]) ? source[meta.day].map((item) => resolveAsset(item)) : [];
        const dayFallback = Array.isArray(fallbackAlbumData[meta.day]) ? fallbackAlbumData[meta.day] : [];
        const resolvedCover = resolveAsset(meta.cover);
        const preferredCover = [resolvedCover, ...jsonPhotos, ...sourcePhotos, ...dayFallback].find((item) => isRemoteUrl(item))
          || resolvedCover;
        const merged = mergeUnique([preferredCover, ...jsonPhotos, ...sourcePhotos, ...dayFallback]);
        normalized[meta.day] = merged.length ? merged : [preferredCover];
        meta.cover = preferredCover;
      });

      return normalized;
    }

    function bindImageFallback(img, day) {
      const fallback = getDayCover(day);
      img.addEventListener('error', () => {
        if (img.dataset.fallbackApplied === '1') {
          img.closest('button')?.remove();
          return;
        }
        img.dataset.fallbackApplied = '1';
        img.src = fallback;
      });
    }

    function parseInitialDay() {
      const params = new URLSearchParams(window.location.search);
      const day = Number(params.get('day'));
      if (Number.isInteger(day) && day >= 1 && day <= 7) return day;
      return 1;
    }

    function updateURLDay(day) {
      const url = new URL(window.location.href);
      url.searchParams.set('day', String(day));
      if (!url.hash) url.hash = 'album';
      window.history.replaceState({}, '', url);
    }

    function updateHeader(total) {
      if (floatingCounter) {
        floatingCounter.textContent = total ? `${Math.min(state.visibleCount, total)} / ${total}` : '';
      }
      syncBottomPills();
    }

    function renderAlbumGrid() {
      const day = state.currentDay;
      const photos = state.albumData[day] || [];
      const visible = photos.slice(0, state.visibleCount);
      updateHeader(photos.length);

      albumGrid.innerHTML = '';
      albumEmpty.classList.toggle('hidden', photos.length !== 0);
      albumLoadMore.classList.toggle('hidden', state.visibleCount >= photos.length || photos.length === 0);

      const frag = document.createDocumentFragment();
      visible.forEach((src, index) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'album-thumb group text-left relative loading';
        item.dataset.photoIndex = String(index);
        item.setAttribute('aria-label', `開啟第 ${day} 天第 ${index + 1} 張照片`);
        item.innerHTML = `
          <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors z-10"></div>
          <img src="${src}" alt="第${day}天照片${index + 1}" loading="lazy" decoding="async" />
          <span class="album-thumb-index">#${index + 1}</span>
        `;
        const img = item.querySelector('img');
        img.addEventListener('load', () => { img.classList.add('loaded'); item.classList.remove('loading'); });
        bindImageFallback(img, day);
        item.addEventListener('click', () => openLightbox(index));
        
        // Contextual Cursor Hover
        item.addEventListener('mouseenter', () => document.body.classList.add('hovering-photo'));
        item.addEventListener('mouseleave', () => document.body.classList.remove('hovering-photo'));
        
        frag.appendChild(item);
      });

      albumGrid.appendChild(frag);
      setupAutoLoad();
      setupStaggerReveal();
    }

    function setupStaggerReveal() {
      const thumbs = albumGrid.querySelectorAll('.album-thumb:not(.reveal-show)');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.classList.add('reveal-show');
            }, i * 60);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

      thumbs.forEach(thumb => observer.observe(thumb));
    }

    function switchDay(day, options = {}) {
      state.currentDay = day;
      state.visibleCount = BATCH_SIZE;
      renderAlbumGrid();
      updateURLDay(day);
      if (options.scroll) {
        document.getElementById('album')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function updateLightbox() {
      const photos = state.albumData[state.currentDay] || [];
      if (!photos.length) return;

      const total = photos.length;
      const nextIndex = (state.lightboxIndex + total) % total;
      state.lightboxIndex = nextIndex;

      const src = photos[nextIndex];
      lightboxImage.dataset.fallbackApplied = '0';
      lightboxImage.src = src;
      lightboxImage.alt = `第${state.currentDay}天照片 ${nextIndex + 1}`;
      lightboxMeta.textContent = `第 ${state.currentDay} 天 · ${nextIndex + 1} / ${total}`;
    }

    function openLightbox(index) {
      state.lightboxIndex = index;
      state.lastFocusedPhoto = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      lightboxShell.classList.add('open');
      updateLightbox();
      syncBodyLock();
    }

    function closeLightbox() {
      lightboxShell.classList.remove('open');
      syncBodyLock();
      state.lastFocusedPhoto?.focus?.();
    }

    function shiftLightbox(delta) {
      state.lightboxIndex += delta;
      updateLightbox();
    }

    function syncBodyLock() {
      document.body.style.overflow = lightboxShell.classList.contains('open') ? 'hidden' : '';
    }

    lightboxClose?.addEventListener('click', closeLightbox);
    lightboxPrev?.addEventListener('click', () => shiftLightbox(-1));
    lightboxNext?.addEventListener('click', () => shiftLightbox(1));

    document.addEventListener('keydown', (e) => {
      if (!lightboxShell.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') shiftLightbox(-1);
      if (e.key === 'ArrowRight') shiftLightbox(1);
    });

    lightboxShell.addEventListener('touchstart', (e) => {
      state.touchStartX = e.changedTouches[0].screenX;
      state.touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    lightboxShell.addEventListener('touchend', (e) => {
      const endX = e.changedTouches[0].screenX;
      const endY = e.changedTouches[0].screenY;
      const deltaX = endX - state.touchStartX;
      const deltaY = endY - state.touchStartY;
      
      if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 40) {
        if (deltaX > 0) {
          shiftLightbox(-1);
        } else {
          shiftLightbox(1);
        }
      }
    }, { passive: true });

    const navbar = document.getElementById('navbar');
    let lastScrollY = window.scrollY;
    let navHideTimeout;
    let preserveNavUntil = 0;

    function revealNavbar() {
      navbar.classList.remove('hidden-nav');
      floatingPillNav?.classList.remove('ui-hidden');
    }

    // ── Floating Pill Nav ──
    function renderBottomPills() {
      if (!bottomPillsEl) return;
      const frag = document.createDocumentFragment();
      dayMeta.forEach((meta) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `pill-day-btn${meta.day === state.currentDay ? ' active' : ''}`;
        btn.dataset.day = String(meta.day);
        btn.style.setProperty('--day-color', `var(--day-${meta.day})`);
        
        const glowColors = {
          1: 'rgba(230,57,70,0.3)',
          2: 'rgba(244,162,97,0.3)',
          3: 'rgba(42,157,143,0.3)',
          4: 'rgba(162,155,254,0.3)',
          5: 'rgba(255,118,117,0.3)',
          6: 'rgba(0,206,201,0.3)',
          7: 'rgba(253,203,110,0.3)'
        };
        btn.style.setProperty('--day-glow', glowColors[meta.day] || glowColors[1]);
        
        btn.textContent = meta.day;
        btn.addEventListener('click', () => switchDay(meta.day, { scroll: true }));
        frag.appendChild(btn);
      });
      bottomPillsEl.replaceChildren(frag);
    }

    function syncBottomPills() {
      if (!bottomPillsEl) return;
      bottomPillsEl.querySelectorAll('.pill-day-btn').forEach((btn) => {
        btn.classList.toggle('active', Number(btn.dataset.day) === state.currentDay);
      });
    }

    // ── Auto Load Observer ──
    function setupAutoLoad() {
      if (state.autoLoadObserver) state.autoLoadObserver.disconnect();
      const photos = state.albumData[state.currentDay] || [];
      if (state.visibleCount >= photos.length) return;
      const sentinel = albumLoadMore;
      if (!sentinel) return;
      state.autoLoadObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          state.visibleCount += BATCH_SIZE;
          renderAlbumGrid();
        }
      }, { rootMargin: '400px' });
      state.autoLoadObserver.observe(sentinel);
    }

    // ── Lightbox Preload ──
    function preloadAdjacent() {
      const photos = state.albumData[state.currentDay] || [];
      if (!photos.length) return;
      const total = photos.length;
      [state.lightboxIndex - 1, state.lightboxIndex + 1].forEach((i) => {
        const idx = ((i % total) + total) % total;
        const img = new Image();
        img.src = photos[idx];
      });
    }
    const origUpdateLightbox = updateLightbox;
    updateLightbox = function() { origUpdateLightbox(); preloadAdjacent(); };

    // ── Floating counter scroll visibility ──
    let counterTimer;
    function showFloatingCounter() {
      if (!floatingCounter) return;
      floatingCounter.classList.add('visible');
      clearTimeout(counterTimer);
      counterTimer = setTimeout(() => floatingCounter.classList.remove('visible'), 1800);
    }

    window.addEventListener('scroll', () => {
      const currentScrollY = window.scrollY;
      const docH = document.documentElement.scrollHeight - window.innerHeight;

      if (scrollProgressEl && docH > 0) {
        scrollProgressEl.style.width = `${Math.round((currentScrollY / docH) * 100)}%`;
      }

      backTop.classList.toggle('hidden-btn', currentScrollY <= window.innerHeight * 0.45);
      showFloatingCounter();

      if (Date.now() < preserveNavUntil) {
        revealNavbar();
        return;
      }

      // Poetic Zero-Chrome: Gentle hiding
      if (currentScrollY <= 100 || currentScrollY < lastScrollY - 30) {
        revealNavbar();
      } else if (currentScrollY > lastScrollY + 10) {
        navbar.classList.add('hidden-nav');
        floatingPillNav?.classList.add('ui-hidden');
      }

      lastScrollY = currentScrollY;
    }, { passive: true });

    backTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function initReveal() {
      const nodes = Array.from(document.querySelectorAll('.reveal'));
      nodes.forEach((node, index) => {
        node.style.transitionDelay = `${Math.min(index * 90, 400)}ms`;
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('show');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      nodes.forEach((el) => observer.observe(el));
    }

    async function initAlbumPage() {
      await loadPhotosJson();
      applyResolvedAssets();
      state.albumData = buildAlbumData();
      state.currentDay = parseInitialDay();
      renderBottomPills();
      renderAlbumGrid();
      updateURLDay(state.currentDay);
      initReveal();
      if (window.location.hash === '#album') {
        preserveNavUntil = Date.now() + 2200;
        window.requestAnimationFrame(() => {
          document.getElementById('album')?.scrollIntoView({ behavior: 'auto', block: 'start' });
          revealNavbar();
        });
      }
    }

    initAlbumPage();

    /* ── Custom Cursor Logic ── */
    if (window.matchMedia('(pointer: fine)').matches) {
      const cursor = document.getElementById('custom-cursor');
      if (cursor) {
        document.addEventListener('mousemove', (e) => {
          window.requestAnimationFrame(() => {
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
          });
        });
        
        const attachCursorHover = () => {
          const interactables = document.querySelectorAll('a, button, .pill-day-btn');
          interactables.forEach(el => {
            el.addEventListener('mouseenter', () => {
              if (!el.classList.contains('album-thumb')) {
                cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                cursor.style.opacity = '0.3';
              }
            });
            el.addEventListener('mouseleave', () => {
              cursor.style.transform = 'translate(-50%, -50%) scale(1)';
              cursor.style.opacity = '1';
            });
          });
        };
        
        attachCursorHover();
        const observer = new MutationObserver(() => attachCursorHover());
        observer.observe(document.body, { childList: true, subtree: true });
      }
    }
  </script>
</body>
